<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow behind eye -->
  <ellipse cx="185" cy="315" rx="180" ry="160" fill="#2563eb" opacity="0.08"/>

  <!-- Logo mark — eye of Metis (scaled up, 100px tall) -->
  <path d="M80 315 C80 315 133 255 185 255 C237 255 290 315 290 315 C290 315 237 375 185 375 C133 375 80 315 80 315Z"
        fill="none" stroke="#2563eb" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="185" cy="315" r="36" fill="#2563eb"/>
  <circle cx="185" cy="315" r="16" fill="#0a0a0a"/>
  <circle cx="198" cy="302" r="6" fill="white" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="322" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="88" font-weight="800" fill="#ffffff" letter-spacing="-4">Metys</text>

  <!-- Divider -->
  <rect x="80" y="410" width="560" height="1.5" fill="#ffffff" opacity="0.08"/>

  <!-- Tagline -->
  <text x="80" y="452" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="400" fill="#52525b" letter-spacing="0.5">Product Intelligence · Sales Acceleration</text>

  <!-- Right panel — KPIs -->
  <rect x="760" y="160" width="360" height="310" rx="16" fill="#ffffff" opacity="0.03"/>
  <rect x="760" y="160" width="360" height="310" rx="16" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.07"/>

  <text x="792" y="234" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="56" font-weight="800" fill="#4ade80" letter-spacing="-2">+20%</text>
  <text x="792" y="264" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" fill="#52525b">Faster quote turnaround</text>

  <rect x="792" y="282" width="296" height="1" fill="#ffffff" opacity="0.06"/>

  <text x="792" y="346" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="56" font-weight="800" fill="#f87171" letter-spacing="-2">−70%</text>
  <text x="792" y="376" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" fill="#52525b">Product selection errors</text>

  <rect x="792" y="394" width="296" height="1" fill="#ffffff" opacity="0.06"/>

  <text x="792" y="444" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" font-weight="500" fill="#a1a1aa">metys.kablee.com</text>
</svg>
